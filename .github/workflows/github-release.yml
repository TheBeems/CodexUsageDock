name: Signed MSIX Release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and sign without publishing, for example 0.2.1"
        required: true
        default: "0.2.1"

permissions:
  contents: read

concurrency:
  group: signed-msix-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -p:Platform=x64 -r win-x64 -p:SelfContained=true
      - name: Test
        run: dotnet test ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -c Debug -p:Platform=x64 -r win-x64 -p:SelfContained=true --no-restore
      - name: Build x64 Release
        run: dotnet build ./CodexUsageDock/CodexUsageDock.csproj -c Release -p:Platform=x64 -r win-x64 --self-contained true
      - name: Build ARM64 Release
        run: dotnet build ./CodexUsageDock/CodexUsageDock.csproj -c Release -p:Platform=ARM64 -r win-arm64 --self-contained true

  build:
    needs: test
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.value }}
      msix-version: ${{ steps.version.outputs.msix }}
      publisher: ${{ steps.configuration.outputs.publisher }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            $version = '0.2.1'
          } else {
            $version = "${{ inputs.version }}"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid release version: $version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT
          "msix=$version.0" >> $env:GITHUB_OUTPUT
      - name: Validate build configuration
        id: configuration
        shell: pwsh
        env:
          ARTIFACT_SIGNING_PUBLISHER: ${{ vars.ARTIFACT_SIGNING_PUBLISHER }}
        run: |
          if ("${{ github.event_name }}" -eq 'pull_request') {
            $publisher = 'CN=Codex Usage Dock CI'
          } else {
            $publisher = $env:ARTIFACT_SIGNING_PUBLISHER
          }
          if ([string]::IsNullOrWhiteSpace($publisher)) {
            throw 'Repository variable ARTIFACT_SIGNING_PUBLISHER is required.'
          }
          "publisher=$publisher" >> $env:GITHUB_OUTPUT
      - name: Build x64 and ARM64 MSIX bundle
        shell: pwsh
        env:
          ARTIFACT_SIGNING_PUBLISHER: ${{ steps.configuration.outputs.publisher }}
        run: |
          ./scripts/build-release.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -Distribution Winget `
            -Publisher $env:ARTIFACT_SIGNING_PUBLISHER
      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-msixbundle-${{ steps.version.outputs.value }}
          path: artifacts/winget/CodexUsageDock-${{ steps.version.outputs.value }}.msixbundle
          if-no-files-found: error
          retention-days: 1

  sign-and-release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: windows-2022
    environment: winget-production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: unsigned-msixbundle-${{ needs.build.outputs.version }}
          path: artifacts/winget
      - name: Validate protected signing configuration
        shell: pwsh
        env:
          BUILD_PUBLISHER: ${{ needs.build.outputs.publisher }}
          ARTIFACT_SIGNING_PUBLISHER: ${{ vars.ARTIFACT_SIGNING_PUBLISHER }}
          ARTIFACT_SIGNING_ENDPOINT: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          $required = @(
            'ARTIFACT_SIGNING_PUBLISHER',
            'ARTIFACT_SIGNING_ENDPOINT',
            'ARTIFACT_SIGNING_ACCOUNT_NAME',
            'ARTIFACT_SIGNING_CERTIFICATE_PROFILE',
            'AZURE_CLIENT_ID',
            'AZURE_TENANT_ID',
            'AZURE_SUBSCRIPTION_ID'
          )
          $missing = @($required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
          if ($missing.Count -gt 0) {
            throw "Missing winget-production variables: $($missing -join ', ')."
          }
          if ($env:BUILD_PUBLISHER -cne $env:ARTIFACT_SIGNING_PUBLISHER) {
            throw 'The repository publisher variable differs from the protected environment publisher variable.'
          }
      - name: Sign in to Azure with GitHub OIDC
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Sign final MSIX bundle
        uses: Azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82 # v2.0.0
        with:
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ github.workspace }}\artifacts\winget\CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-workload-identity-credential: false
      - name: Verify public signature, timestamp, identity, and architectures
        shell: pwsh
        env:
          ARTIFACT_SIGNING_PUBLISHER: ${{ vars.ARTIFACT_SIGNING_PUBLISHER }}
        run: |
          ./scripts/verify-signed-msix.ps1 `
            -BundlePath "artifacts/winget/CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle" `
            -ExpectedPublisher $env:ARTIFACT_SIGNING_PUBLISHER `
            -ExpectedVersion "${{ needs.build.outputs.msix-version }}"
      - name: Smoke-test package install, registration, and removal
        shell: pwsh
        env:
          ARTIFACT_SIGNING_PUBLISHER: ${{ vars.ARTIFACT_SIGNING_PUBLISHER }}
        run: |
          $bundle = Resolve-Path "artifacts/winget/CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle"
          $package = $null
          try {
            Add-AppxPackage -Path $bundle
            $package = Get-AppxPackage -Name 'TheBeems.CodexUsageDock'
            if (-not $package) { throw 'The installed package was not found.' }
            if ([string]$package.Version -cne '${{ needs.build.outputs.msix-version }}') {
              throw "Installed version '$($package.Version)' is incorrect."
            }
            if ($package.Publisher -cne $env:ARTIFACT_SIGNING_PUBLISHER) {
              throw "Installed publisher '$($package.Publisher)' is incorrect."
            }

            $manifest = $package | Get-AppxPackageManifest
            $comClass = $manifest.SelectSingleNode("//*[local-name()='Extension' and @Category='windows.comServer']//*[local-name()='Class' and @Id='35b848eb-6ef7-4b5d-9f8b-49b5614abb48']")
            if (-not $comClass) { throw 'Packaged COM registration is missing.' }
            $appExtension = $manifest.SelectSingleNode("//*[local-name()='AppExtension' and @Name='com.microsoft.commandpalette']")
            if (-not $appExtension) { throw 'Command Palette app-extension registration is missing.' }

            Write-Host "PackageFamilyName: $($package.PackageFamilyName)"
          }
          finally {
            $installedPackage = Get-AppxPackage -Name 'TheBeems.CodexUsageDock' -ErrorAction SilentlyContinue
            if ($installedPackage) {
              $installedPackage | Remove-AppxPackage
            }
          }
          if (Get-AppxPackage -Name 'TheBeems.CodexUsageDock' -ErrorAction SilentlyContinue) {
            throw 'The package remained installed after the smoke test.'
          }
      - name: Generate checksum for signed release asset
        shell: pwsh
        run: |
          $bundle = Get-Item "artifacts/winget/CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle"
          $hash = (Get-FileHash -LiteralPath $bundle.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($bundle.Name)" | Set-Content -LiteralPath artifacts/winget/SHA256SUMS.txt -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: signed-msixbundle-${{ needs.build.outputs.version }}
          path: |
            artifacts/winget/CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle
            artifacts/winget/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
      - name: Create immutable GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw 'The GitHub release already exists; published release assets must never be replaced.'
          }
          gh release create "${{ github.ref_name }}" `
            "artifacts/winget/CodexUsageDock-${{ needs.build.outputs.version }}.msixbundle" `
            "artifacts/winget/SHA256SUMS.txt" `
            --repo "${{ github.repository }}" `
            --title "Codex Usage Dock ${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag
