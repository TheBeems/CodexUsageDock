name: Update WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.2.0"
        required: true
      tag:
        description: "GitHub release tag, for example v0.2.0"
        required: true

permissions:
  contents: read

concurrency:
  group: winget-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  submit:
    name: Submit WinGet update
    runs-on: windows-2022
    env:
      WINGET_PAT: ${{ secrets.WINGET_PAT }}

    steps:
      - name: Determine release coordinates
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
            $version = $tag -replace '^v', ''
          } else {
            $tag = "${{ inputs.tag }}"
            $version = "${{ inputs.version }}"
          }

          if ($tag -ne "v$version" -or $version -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "Tag '$tag' and version '$version' do not form a valid release pair."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Require WinGet submission token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_PAT)) {
            throw 'Repository secret WINGET_PAT is required. Use a dedicated classic GitHub PAT with public_repo access for WinGetCreate submissions.'
          }

      - name: Download WingetCreate
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit package update
        shell: pwsh
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $tag = "${{ steps.release.outputs.tag }}"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"
          $x64Url = "$baseUrl/CodexUsageDock-$version-x64-setup.exe|x64"
          $arm64Url = "$baseUrl/CodexUsageDock-$version-arm64-setup.exe|arm64"

          .\wingetcreate.exe update TheBeems.CodexUsageDock `
            --version $version `
            --urls $x64Url $arm64Url `
            --submit `
            --no-open `
            --token $env:WINGET_PAT

          if ($LASTEXITCODE -ne 0) {
            throw "WingetCreate failed with exit code $LASTEXITCODE."
          }
