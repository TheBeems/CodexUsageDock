name: Build Store package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Store package version, for example 0.2.0"
        required: true
        default: "0.2.0"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build unsigned Store packages
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CodexUsageDock-${{ inputs.version }}-store
          path: |
            artifacts/store/CodexUsageDock-*.msix
            artifacts/store/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
