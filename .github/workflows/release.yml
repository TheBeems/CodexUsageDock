name: Store package

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Store release version, for example 0.2.1"
        required: true
        default: "0.2.1"

permissions:
  contents: read

concurrency:
  group: store-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Determine package version
        id: version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            $version = "0.0.1"
          } else {
            $version = $env:REQUESTED_VERSION
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid release version: $version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT
      - name: Restore
        run: dotnet restore ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -p:Platform=x64 -r win-x64 -p:SelfContained=true
      - name: Test
        run: dotnet test ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -c Debug -p:Platform=x64 -r win-x64 -p:SelfContained=true --no-restore
      - name: Build x64 Debug
        run: dotnet build ./CodexUsageDock/CodexUsageDock.csproj -c Debug -p:Platform=x64 -r win-x64 --self-contained true
      - name: Build ARM64 Debug
        run: dotnet build ./CodexUsageDock/CodexUsageDock.csproj -c Debug -p:Platform=ARM64 -r win-arm64 --self-contained true
      - name: Build and validate Store package
        shell: pwsh
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.value }}
        run: ./scripts/build-release.ps1 -Version $env:PACKAGE_VERSION
      - name: Confirm source manifest was restored
        shell: pwsh
        run: |
          git diff --exit-code -- CodexUsageDock/Package.appxmanifest
          $expected = @(
            "CodexUsageDock-${{ steps.version.outputs.value }}.msixupload",
            "SHA256SUMS.txt"
          )
          $actual = @(Get-ChildItem artifacts/store -File | ForEach-Object Name | Sort-Object)
          $difference = @(Compare-Object ($expected | Sort-Object) $actual)
          if ($difference.Count -gt 0) {
            throw "Unexpected Store artifacts: $($actual -join ', ')"
          }
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: CodexUsageDock-${{ steps.version.outputs.value }}-store
          path: |
            artifacts/store/CodexUsageDock-${{ steps.version.outputs.value }}.msixupload
            artifacts/store/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
