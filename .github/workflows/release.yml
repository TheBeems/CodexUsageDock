name: Build Store package (paused)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Store package version to build without publishing, for example 0.2.1"
        required: true
        default: "0.2.1"

permissions:
  contents: read

concurrency:
  group: microsoft-store-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -p:Platform=x64 -r win-x64 -p:SelfContained=true
      - name: Test
        run: dotnet test ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -c Debug -p:Platform=x64 -r win-x64 -p:SelfContained=true --no-restore
      - name: Build unsigned Store packages only
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ inputs.version }}" -Distribution Store
      - uses: actions/upload-artifact@v4
        with:
          name: CodexUsageDock-${{ inputs.version }}-store-build-only
          path: |
            artifacts/store/CodexUsageDock-*.msix
            artifacts/store/CodexUsageDock-*.msixbundle
            artifacts/store/CodexUsageDock-*.msixupload
            artifacts/store/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
