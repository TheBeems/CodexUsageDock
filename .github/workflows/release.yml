name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.arch }} installer
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "${{ inputs.version }}"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "Invalid version: $version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ steps.version.outputs.value }}" -Platforms "${{ matrix.arch }}"

      - name: Smoke-test x64 install and uninstall
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $installer = "artifacts/installers/CodexUsageDock-$version-x64-setup.exe"
          $install = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Installer failed with exit code $($install.ExitCode)" }

          $installDir = Join-Path $env:LOCALAPPDATA "Programs/CodexUsageDock"
          $server = (Get-Item -LiteralPath "HKCU:\Software\Classes\CLSID\{35b848eb-6ef7-4b5d-9f8b-49b5614abb48}\LocalServer32").GetValue('')
          if (-not (Test-Path -LiteralPath (Join-Path $installDir 'CodexUsageDock.exe'))) { throw 'Installed executable is missing.' }
          if ($server -notlike '*CodexUsageDock.exe*') { throw "COM registration is invalid: $server" }

          $uninstall = Start-Process -FilePath (Join-Path $installDir 'unins000.exe') -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller failed with exit code $($uninstall.ExitCode)" }
          if (Test-Path -LiteralPath "HKCU:\Software\Classes\CLSID\{35b848eb-6ef7-4b5d-9f8b-49b5614abb48}") { throw 'COM registration remained after uninstall.' }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.arch }}
          path: artifacts/installers/CodexUsageDock-*.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum CodexUsageDock-*.exe > SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "Codex Usage Dock ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
