name: Build Store package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Store package version, for example 0.2.0"
        required: true
        default: "0.2.0"
      submission:
        description: "Create a Partner Center draft or submit it for certification"
        required: true
        type: choice
        default: draft
        options:
          - draft
          - certification

permissions:
  contents: read

concurrency:
  group: microsoft-store-submission
  cancel-in-progress: false

env:
  STORE_PRODUCT_ID: 9NFCPJXQG9FG

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -p:Platform=x64 -r win-x64 -p:SelfContained=true
      - name: Test
        run: dotnet test ./CodexUsageDock.Tests/CodexUsageDock.Tests.csproj -c Debug -p:Platform=x64 -r win-x64 -p:SelfContained=true --no-restore
      - name: Build unsigned Store packages
        shell: pwsh
        run: ./scripts/build-release.ps1 -Version "${{ inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CodexUsageDock-${{ inputs.version }}-store
          path: |
            artifacts/store/CodexUsageDock-*.msix
            artifacts/store/CodexUsageDock-*.msixbundle
            artifacts/store/CodexUsageDock-*.msixupload
            artifacts/store/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: build
    runs-on: windows-2022
    environment: microsoft-store-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: CodexUsageDock-${{ inputs.version }}-store
          path: artifacts/store
      - name: Set up Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2
      - name: Configure Partner Center credentials
        shell: pwsh
        env:
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        run: |
          $required = @(
            'PARTNER_CENTER_TENANT_ID',
            'PARTNER_CENTER_SELLER_ID',
            'PARTNER_CENTER_CLIENT_ID',
            'PARTNER_CENTER_CLIENT_SECRET'
          )
          $missing = @($required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) })
          if ($missing.Count -gt 0) {
            throw "Missing GitHub environment secrets: $($missing -join ', ')."
          }

          msstore reconfigure `
            --tenantId $env:PARTNER_CENTER_TENANT_ID `
            --sellerId $env:PARTNER_CENTER_SELLER_ID `
            --clientId $env:PARTNER_CENTER_CLIENT_ID `
            --clientSecret $env:PARTNER_CENTER_CLIENT_SECRET
      - name: Upload Partner Center draft
        if: inputs.submission == 'draft'
        shell: pwsh
        run: msstore publish . --inputFile "artifacts/store/CodexUsageDock-${{ inputs.version }}.msixupload" --appId $env:STORE_PRODUCT_ID --noCommit
      - name: Submit for Store certification
        if: inputs.submission == 'certification'
        shell: pwsh
        run: msstore publish . --inputFile "artifacts/store/CodexUsageDock-${{ inputs.version }}.msixupload" --appId $env:STORE_PRODUCT_ID
      - name: Report submission status
        shell: pwsh
        run: msstore submission status $env:STORE_PRODUCT_ID
