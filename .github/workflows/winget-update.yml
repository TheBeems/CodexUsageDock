name: Submit WinGet update

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Published version, for example 0.2.2"
        required: true
      tag:
        description: "Existing GitHub release tag, for example v0.2.2"
        required: true

permissions:
  contents: read

jobs:
  update:
    if: vars.WINGET_AUTOMATION_ENABLED == 'true'
    runs-on: windows-2022
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x
      - name: Determine published bundle
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq 'release') {
            $tag = "${{ github.event.release.tag_name }}"
            $version = $tag -replace '^v', ''
          } else {
            $tag = "${{ inputs.tag }}"
            $version = "${{ inputs.version }}"
          }
          if ($tag -cne "v$version" -or $version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Tag '$tag' and version '$version' do not form a valid release pair."
          }
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/CodexUsageDock-$version.msixbundle"
          "version=$version" >> $env:GITHUB_OUTPUT
          "url=$url" >> $env:GITHUB_OUTPUT
      - name: Download WingetCreate
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
      - name: Submit WinGet update
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_PAT)) {
            throw 'WINGET_PAT is required.'
          }
          ./wingetcreate.exe update TheBeems.CodexUsageDock `
            --version "${{ steps.release.outputs.version }}" `
            --urls "${{ steps.release.outputs.url }}" `
            --token $env:WINGET_PAT `
            --submit
